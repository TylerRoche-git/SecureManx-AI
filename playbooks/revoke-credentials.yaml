id: revoke-credentials
name: Revoke Credentials
trigger:
  min_confidence: 0.5
  actions:
    - revoke_credentials
steps:
  - name: identify-credentials
    action: detect_only
    description: Identify all credentials accessible to compromised workload
    timeout: 15s
  - name: rotate-secrets
    action: revoke_credentials
    description: Rotate affected secrets via Vault or secret manager API
    timeout: 60s
  - name: invalidate-sessions
    action: revoke_credentials
    description: Invalidate active sessions and tokens for affected service accounts
    timeout: 30s
  - name: restart-dependents
    action: kill_replace
    description: Restart dependent workloads with new credentials
    timeout: 120s
  - name: monitor-identity
    action: detect_only
    description: Monitor for continued suspicious identity-plane signals
    timeout: 10s
  - name: log-rotation
    action: detect_only
    description: Log all rotated credentials and affected services
    timeout: 10s
