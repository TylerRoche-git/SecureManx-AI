version: "3.9"

services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"  # monitoring
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: secbrain
      POSTGRES_PASSWORD: secbrain
      POSTGRES_DB: secbrain
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  nats-data:
  pg-data:
